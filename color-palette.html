<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 30px 20px;
        }
        .wrapper {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .mode-tab {
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid #333;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .mode-tab.active {
            border-color: #667eea;
            background: #667eea20;
            color: #667eea;
        }
        .mode-tab:hover:not(.active) { border-color: #555; }

        .palette-display {
            display: flex;
            height: 220px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .color-swatch {
            flex: 1;
            position: relative;
            cursor: pointer;
            transition: flex 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }
        .color-swatch:hover { flex: 1.3; }
        .color-info {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 10px 14px;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }
        .color-swatch:hover .color-info {
            opacity: 1;
            transform: translateY(0);
        }
        .color-hex {
            font-family: monospace;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
        }
        .color-rgb {
            font-size: 0.75rem;
            color: #ccc;
            margin-top: 4px;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ctrl-generate {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }
        .ctrl-generate:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .ctrl-save {
            background: #2d2d44;
            color: #fff;
            border: 2px solid #444;
        }
        .ctrl-save:hover { border-color: #667eea; }
        .ctrl-gradient {
            background: #2d2d44;
            color: #fff;
            border: 2px solid #444;
        }
        .ctrl-gradient:hover { border-color: #feca57; }.saved-section {
            margin-top: 30px;
        }
        .saved-title {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .saved-palettes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .saved-card {
            background: #252540;
            border-radius: 14px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .saved-card:hover { transform: translateY(-4px); background: #2d2d50; }
        .saved-colors {
            display: flex;
            height: 50px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .saved-color-mini { flex: 1; }
        .saved-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #888;
        }
        .saved-delete {
            background: none;
            border: none;
            color: #e53e3e;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px;
        }

        .gradient-preview {
            height: 120px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #48bb78;
            color: #fff;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .back {
            display: inline-block;
            margin-top: 30px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>🎨 Color Palette Generator</h1>
        <p class="subtitle">Generate harmonious color palettes with one click</p>

        <div class="mode-tabs">
            <button class="mode-tab active" onclick="setMode('random')">🎲 Random</button>
            <button class="mode-tab" onclick="setMode('complementary')">🔀 Complementary</button>
            <button class="mode-tab" onclick="setMode('triadic')">🔺 Triadic</button>
            <button class="mode-tab" onclick="setMode('analogous')">📊 Analogous</button>
        </div>

        <div class="gradient-preview" id="gradientPreview">CSS Gradient</div>

        <div class="palette-display" id="paletteDisplay"></div>

        <div class="controls">
            <button class="ctrl-btn ctrl-generate" onclick="generate()">🔄 Generate New</button>
            <button class="ctrl-btn ctrl-save" onclick="savePalette()">💾 Save</button>
            <button class="ctrl-btn ctrl-gradient" onclick="toggleGradient()">🌈 Gradient</button>
        </div>

        <div class="saved-section">
            <div class="saved-title">📁 Saved Palettes</div>
            <div class="saved-palettes" id="savedPalettes"></div>
        </div>

        <a href="index.html" class="back">← Back to Home</a>
    </div>

    <div class="toast" id="toast">✅ Copied!</div>

    <script>
        let currentMode = 'random';
        let currentPalette = [];
        let showGradient = false;

function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        function hexToRgb(hex) {
            const bigint = parseInt(hex.slice(1), 16);
            return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
        }

        function hsvToRgb(h, s, v) {
            let r, g, b;
            const i = Math.floor(h * 6);
            const f = h * 6 - i;
            const p = v * (1 - s);
            const q = v * (1 - f * s);
            const t = v * (1 - (1 - f) * s);
            switch (i % 6) {
                case 0: r = v; g = t; b = p; break;
                case 1: r = q; g = v; b = p; break;
                case 2: r = p; g = v; b = t; break;
                case 3: r = p; g = q; b = v; break;
                case 4: r = t; g = p; b = v; break;
                case 5: r = v; g = p; b = q; break;
            }
            return { r: Math.round(r * 255), g: Math.round(g * 255), b: Math.round(b * 255) };
        }

        function generateRandom() {
            const colors = [];
            for (let i = 0; i < 5; i++) {
                const r = Math.floor(Math.random() * 256);
                const g = Math.floor(Math.random() * 256);
                const b = Math.floor(Math.random() * 256);
                colors.push(rgbToHex(r, g, b));
            }
            return colors;
        }

        function generateComplementary() {
            const baseH = Math.random();
            const colors = [];
            for (let i = 0; i < 5; i++) {
                const h = (baseH + (i % 2 === 0 ? 0 : 0.5) + Math.random() * 0.05) % 1;
                const s = 0.6 + Math.random() * 0.3;
                const v = 0.7 + Math.random() * 0.2;
                const rgb = hsvToRgb(h, s, v);
                colors.push(rgbToHex(rgb.r, rgb.g, rgb.b));
            }
            return colors;
        }

        function generateTriadic() {
            const baseH = Math.random();
            const colors = [];
            for (let i = 0; i < 5; i++) {
                const h = (baseH + (i * 0.33) % 1 + Math.random() * 0.03) % 1;
                const s = 0.6 + Math.random() * 0.3;
                const v = 0.7 + Math.random() * 0.2;
                const rgb = hsvToRgb(h, s, v);
                colors.push(rgbToHex(rgb.r, rgb.g, rgb.b));
            }
            return colors;
        }

        function generateAnalogous() {
            const baseH = Math.random();
            const colors = [];
            for (let i = 0; i < 5; i++) {
                const h = (baseH + i * 0.05 + Math.random() * 0.02) % 1;
                const s = 0.5 + Math.random() * 0.4;
                const v = 0.6 + Math.random() * 0.3;
                const rgb = hsvToRgb(h, s, v);
                colors.push(rgbToHex(rgb.r, rgb.g, rgb.b));
            }
            return colors;
        }

        function generate() {
            if (currentMode === 'random') currentPalette = generateRandom();
            else if (currentMode === 'complementary') currentPalette = generateComplementary();
            else if (currentMode === 'triadic') currentPalette = generateTriadic();
            else if (currentMode === 'analogous') currentPalette = generateAnalogous();
            renderPalette();
        }

        function renderPalette() {
            const container = document.getElementById('paletteDisplay');
            container.innerHTML = currentPalette.map(hex => {
                const rgb = hexToRgb(hex);
                return `
                    <div class="color-swatch" style="background:${hex};" onclick="copyColor('${hex}')">
                        <div class="color-info">
                            <div class="color-hex">${hex}</div>
                            <div class="color-rgb">rgb(${rgb.r}, ${rgb.g}, ${rgb.b})</div>
                        </div>
                    </div>
                `;
            }).join('');

if (showGradient) {
                const gp = document.getElementById('gradientPreview');
                gp.style.display = 'flex';
                gp.style.background = `linear-gradient(135deg, ${currentPalette.join(', ')})`;
                gp.textContent = 'CSS: linear-gradient(135deg, ' + currentPalette.join(', ') + ')';
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            generate();
        }

        function toggleGradient() {
            showGradient = !showGradient;
            const gp = document.getElementById('gradientPreview');
            if (showGradient) {
                gp.style.display = 'flex';
                renderPalette();
            } else {
                gp.style.display = 'none';
            }
        }

        function copyColor(hex) {
            navigator.clipboard.writeText(hex).then(() => showToast(`✅ ${hex} Copied!`));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function savePalette() {
            const saved = JSON.parse(localStorage.getItem('savedPalettes') || '[]');
            saved.unshift({ colors: [...currentPalette], date: new Date().toLocaleString('ar-EG') });
            if (saved.length > 10) saved.pop();
            localStorage.setItem('savedPalettes', JSON.stringify(saved));
            renderSaved();
            showToast('💾 Saved to collection!');
        }

        function renderSaved() {
            const container = document.getElementById('savedPalettes');
            const saved = JSON.parse(localStorage.getItem('savedPalettes') || '[]');
            if (saved.length === 0) {
                container.innerHTML = '<p style="color:#666;grid-column:1/-1;text-align:center;">No saved palettes</p>';
                return;
            }
            container.innerHTML = saved.map((p, idx) => `
                <div class="saved-card" onclick="loadSaved(${idx})">
                    <div class="saved-colors">
                        ${p.colors.map(c => `<div class="saved-color-mini" style="background:${c};"></div>`).join('')}
                    </div>
                    <div class="saved-card-footer">
                        <span>${p.date}</span>
                        <button class="saved-delete" onclick="event.stopPropagation();deleteSaved(${idx})">🗑</button>
                    </div>
                </div>
            `).join('');
        }

        function loadSaved(idx) {
            const saved = JSON.parse(localStorage.getItem('savedPalettes') || '[]');
            currentPalette = saved[idx].colors;
            renderPalette();
        }

        function deleteSaved(idx) {
            const saved = JSON.parse(localStorage.getItem('savedPalettes') || '[]');
            saved.splice(idx, 1);
            localStorage.setItem('savedPalettes', JSON.stringify(saved));
            renderSaved();
        }

        generate();
        renderSaved();
    </script>
</body>
</html>
